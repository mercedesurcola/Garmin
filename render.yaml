services:
  - type: web
    name: cusol-garmin
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: API_SECRET
        generateValue: true   # Render genera un valor random automáticamente
      - key: TOKENS_DIR
        value: /tmp/garmin_tokens
